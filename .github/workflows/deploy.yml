name: Deploy app to dev and prod
on: push

permissions:
  actions: read
  contents: write
  security-events: write
  packages: write
  id-token: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'kotlin' ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Setup java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Build
        run: |
          ./gradlew clean build -x test

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: "read"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        id: setup-java
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: "gradle"
      - run: ./gradlew test

  build:
    if: github.actor != 'dependabot[bot]'
    name: Build
    runs-on: ubuntu-latest
    permissions:
      packages: "write"
      contents: "write"
      id-token: "write"
    outputs:
      image: ${{ steps.docker-build-push.outputs.image }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        id: setup-java
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: "gradle"
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - run: corepack enable
      - run: yarn --immutable
        env:
          NPM_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}
        working-directory: web
      - run: yarn build
        working-directory: web
      - run: yarn copy
        working-directory: web
      - name: Build jar
        run: |
          ./gradlew shadowJar -x test
      - name: Generate and output SBOM
        uses: gradle/gradle-build-action@v3.5.0
        with:
          dependency-graph: generate-and-submit
          arguments: build
      - name: Push docker image to GAR
        uses: nais/docker-build-push@v0
        env:
          ACTIONS_RUNTIME_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        id: docker-build-push
        with:
          team: teamsykmelding
          salsa: true
          identity_provider: ${{ secrets.NAIS_WORKLOAD_IDENTITY_PROVIDER }}
          project_id: ${{ vars.NAIS_MANAGEMENT_PROJECT_ID }}

  dependabot-build:
    if: github.actor == 'dependabot[bot]'
    name: Build
    runs-on: ubuntu-latest
    permissions:
      packages: "write"
      contents: "write"
      id-token: "write"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        id: setup-java
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: "gradle"
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - run: corepack enable
      - run: yarn --immutable
        env:
          NPM_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}
        working-directory: web
      - run: yarn build
        working-directory: web
      - run: yarn copy
        working-directory: web
      - name: Build jar
        run: |
          ./gradlew shadowJar -x test

  deploy-dev:
    if: github.actor != 'dependabot[bot]'
    name: Deploy to dev
    runs-on: ubuntu-latest
    needs: [ test, build ]
    steps:
      - uses: actions/checkout@v5
      - uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: naiserator-dev.yaml
          VAR: image=${{ needs.build.outputs.image }},commit=${{ github.sha }},sourceVersionURL=https://github.com/${{ github.repository }}/tree/${{ github.sha }}

  deploy-prod:
    if: github.ref_name == 'main'
    name: Deploy to prod
    runs-on: ubuntu-latest
    needs: [ test, build ]
    steps:
      - uses: actions/checkout@v5
      - uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: prod-gcp
          RESOURCE: naiserator-prod.yaml
          VAR: image=${{ needs.build.outputs.image }},commit=${{ github.sha }},sourceVersionURL=https://github.com/${{ github.repository }}/tree/${{ github.sha }}
